services:
  postgres:
    # Använder senaste versionen för säkerhet och funktioner
    image: postgres:16
    container_name: yrkesco-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: yrkesco_db
    ports:
      - "5433:5432"
    volumes:
      # Lagrar datan lokalt i Docker för att inte förlora den vid omstart
      - postgres_data:/var/lib/postgresql/data
volumes:
  postgres_data: {}